<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CapturFlow — bring-your-own widget</title>
    <style>
        :root { color-scheme: dark; }
        body { margin:0; min-height:100vh; font:14px/1.5 system-ui,sans-serif; color:#e2e8f0;
            background:radial-gradient(1000px 500px at 50% -10%,#102a1e,#060b13 60%); padding:40px 20px; }
        .wrap { max-width:640px; margin:0 auto; }
        h1 { font-size:20px; } .sub { color:#94a3b8; font-size:13px; margin-top:-8px; }
        button#start { border:0; border-radius:10px; padding:10px 18px; font-weight:600; color:#fff; background:#059669; cursor:pointer; margin:14px 0; }
        button#start:disabled { opacity:.4; cursor:not-allowed; }
        video#out { width:100%; border-radius:10px; background:#000; margin-top:12px; }

        /* ── the consumer's own overlay widget ── */
        #my-overlay {
            width:100%; height:100%; display:flex; flex-direction:column; overflow:hidden;
            background:#1e1b4b; color:#e0e7ff; font-family:system-ui,sans-serif;
        }
        #my-overlay .cam-wrap { flex:1 1 auto; min-height:0; position:relative; background:#000; }
        #my-overlay video { width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
        #my-overlay .name { position:absolute; left:8px; bottom:6px; font-size:11px; font-weight:700;
            text-shadow:0 1px 3px #000; }
        #my-overlay .controls { flex:0 0 auto; display:flex; gap:6px; padding:8px; background:rgba(0,0,0,.3); }
        #my-overlay button { flex:1; border:0; border-radius:8px; padding:6px; font-size:12px; font-weight:700;
            color:#fff; background:#4338ca; cursor:pointer; }
        #my-overlay button.stop { background:#e11d48; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Bring-your-own widget</h1>
        <p class="sub">Your own element is mounted into the PiP/popup window via <code>pip.customWidget</code>. The <code>&lt;video data-capturflow-camera&gt;</code> gets the live webcam; your buttons call the instance API.</p>

        <button id="start">▶ Start recording</button>

        <!-- This element is moved INTO the PiP/popup window by CapturFlow. -->
        <div id="my-overlay" style="position:absolute; left:-9999px; width:240px; height:200px;">
            <div class="cam-wrap">
                <video data-capturflow-camera autoplay muted playsinline></video>
                <span class="name">My Session</span>
            </div>
            <div class="controls">
                <button data-act="pause">Pause</button>
                <button data-act="resume">Resume</button>
                <button data-act="stop" class="stop">Stop</button>
            </div>
        </div>

        <video id="out" controls style="display:none"></video>
    </div>

    <script type="module">
        import { CapturFlow } from '../dist/index.esm.js';
        const $ = (id) => document.getElementById(id);
        const overlay = $('my-overlay');

        const rec = new CapturFlow({
            capture: { displaySurface: 'window', hideBrowserChrome: true },
            pip: { customWidget: overlay, title: 'My Session' },
        });

        // Wire the consumer widget's buttons to the instance API.
        overlay.querySelectorAll('button').forEach((b) => {
            b.onclick = () => {
                const act = b.dataset.act;
                if (act === 'pause') rec.pause();
                else if (act === 'resume') rec.resume();
                else if (act === 'stop') rec.stop();
            };
        });

        rec.on('stopped', ({ url }) => { $('out').style.display = ''; $('out').src = url; });
        rec.on('error', ({ code, message }) => alert(`${code}: ${message}`));

        const support = CapturFlow.checkSupport();
        $('start').disabled = !support.supported;
        if (!support.supported) $('start').title = support.reasons.join(' ');
        $('start').onclick = () => rec.start();
    </script>
</body>
</html>
